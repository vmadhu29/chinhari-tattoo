<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -100 120 200" fill="none" stroke="#8B1E1E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Drummer matching user's exact reference style -->
    <!-- Head and Neck -->
    <circle cx="0" cy="-65" r="14" fill="#8B1E1E" stroke="none" />
    <line x1="0" y1="-51" x2="0" y2="-45" stroke-width="6" />
    
    <!-- Torso (Two bold triangles) -->
    <polygon points="0,-15 -25,-45 25,-45" fill="#8B1E1E" stroke="none" />
    <polygon points="0,-15 -25,25 25,25" fill="#8B1E1E" stroke="none" />
    
    <!-- Left Arm & Drumstick -->
    <polyline points="-25,-45 -40,-15 -20,-5" />
    <line x1="-20" y1="-5" x2="-5" y2="10" stroke-width="3" />
    <circle cx="-5" cy="10" r="4" fill="#8B1E1E" stroke="none" />
    
    <!-- Right Arm & Drumstick -->
    <polyline points="25,-45 40,-20 15,-10" />
    <line x1="15" y1="-10" x2="-5" y2="-20" stroke-width="3" />
    <circle cx="-5" cy="-20" r="4" fill="#8B1E1E" stroke="none" />
    
    <!-- Left Leg & Foot (bent back) -->
    <polyline points="-10,25 -25,50 -5,80" />
    <line x1="-5" y1="80" x2="-20" y2="80" />
    
    <!-- Right Leg & Foot (bent forward) -->
    <polyline points="10,25 30,50 15,80" />
    <line x1="15" y1="80" x2="30" y2="80" />
</svg>
