<svg xmlns="http://www.w3.org/2000/svg" viewBox="-60 -70 120 120" stroke="#8B1E1E" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Deer body: Two horizontal triangles -->
    <polygon points="0,0 -25,15 -25,-15" fill="#8B1E1E" stroke="none" /> <!-- Hind quarters -->
    <polygon points="0,0 25,15 25,-15" fill="#8B1E1E" stroke="none" /> <!-- Front quarters -->
    
    <!-- Neck & Head -->
    <line x1="25" y1="-15" x2="35" y2="-35" stroke-width="4" />
    <circle cx="38" cy="-38" r="5" fill="#8B1E1E" stroke="none" />
    
    <!-- Antlers -->
    <path d="M 38,-43 Q 30,-55 20,-60" />
    <path d="M 38,-43 Q 48,-55 55,-60" />
    
    <!-- Front Legs -->
    <path d="M 25,15 L 25,40" />
    <path d="M 12,8 L 12,35" />
    
    <!-- Hind Legs -->
    <path d="M -25,15 L -25,40" />
    <path d="M -12,8 L -12,35" />
    
    <!-- Tail -->
    <line x1="-25" y1="-15" x2="-35" y2="-25" />
</svg>
